<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DynoNoble Pro v5</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --dn-blue: #004795; --dn-orange: #F37021; }
        body { font-family: sans-serif; background: #f0f2f5; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; border-top: 6px solid var(--dn-blue); }
        h1 { color: var(--dn-blue); text-align: center; margin-top: 0; font-size: 24px; }
        label { font-weight: bold; display: block; margin-top: 10px; color: #444; }
        select, input, button { width: 100%; padding: 14px; margin: 8px 0; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button { background: var(--dn-blue); color: white; border: none; font-weight: bold; transition: 0.2s; }
        button:active { opacity: 0.8; transform: scale(0.98); }
        .secondary { background: var(--dn-orange); }
        #history { background: #fff; padding: 10px; border-radius: 8px; max-height: 250px; overflow-y: auto; border: 1px solid #ddd; font-size: 13px; }
        .log-item { border-bottom: 1px solid #eee; padding: 8px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>DynoNoble Pro</h1>
        
        <label>Explosive Product</label>
        <select id="product" onchange="updateDensity()">
            <option value="0.82">ANFO (Poured) - 0.82</option>
            <option value="0.95">ANFO (Blow Loaded) - 0.95</option>
            <option value="1.20">TITAN XL 1000 - 1.20</option>
            <option value="1.25">TITAN 1000 G - 1.25</option>
            <option value="custom">Custom Density...</option>
        </select>

        <label>Input A (e.g. Volume/Holes)</label>
        <input type="number" id="inputA" placeholder="Enter value">
        
        <label>Density (g/cc)</label>
        <input type="number" id="inputB" value="0.82" step="0.01">
        
        <button onclick="calculate()">CALCULATE & LOG GPS</button>
        <button class="secondary" onclick="exportCSV()">EXPORT REPORT (CSV)</button>
    </div>

    <div class="card">
        <h3>Field Log (Last 10)</h3>
        <div id="history">No data captured yet.</div>
    </div>

    <script>
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        let logs = JSON.parse(localStorage.getItem('dynoLogs')) || [];

        function updateDensity() {
            const sel = document.getElementById('product');
            if(sel.value !== "custom") document.getElementById('inputB').value = sel.value;
        }

        function calculate() {
            const a = parseFloat(document.getElementById('inputA').value) || 0;
            const b = parseFloat(document.getElementById('inputB').value) || 0;
            const res = (a * b).toFixed(2);
            
            navigator.geolocation.getCurrentPosition(pos => {
                const entry = {
                    time: new Date().toLocaleString(),
                    val: res,
                    lat: pos.coords.latitude.toFixed(5),
                    lon: pos.coords.longitude.toFixed(5)
                };
                logs.unshift(entry);
                if(logs.length > 50) logs.pop();
                localStorage.setItem('dynoLogs', JSON.stringify(logs));
                render();
            }, err => { alert("Turn on GPS for logging"); });
        }

        function render() {
            const h = document.getElementById('history');
            h.innerHTML = logs.slice(0,10).map(l => 
                `<div class="log-item"><b>${l.val}</b> kg/units<br><small>${l.time} | Loc: ${l.lat}, ${l.lon}</small></div>`
            ).join('');
        }

        function exportCSV() {
            let csv = "Timestamp,Result,Latitude,Longitude\n" + 
                logs.map(l => `${l.time},${l.val},${l.lat},${l.lon}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `DynoReport_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }
        render();
    </script>
</body>
</html>
